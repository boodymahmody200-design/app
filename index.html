<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>LUMINA | متجر اللابتوب السريع</title>
    <meta name="description" content="متجر LUMINA - أفضل وأسرع متجر لشراء أجهزة اللابتوب Workstation, Business, Gaming بأرخص الأسعار مع ضمان حقيقي.">
    <meta name="keywords" content="لابتوب, متجر لابتوب, Workstation, Gaming, Business, شراء لابتوب">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://script.google.com">
    <link rel="preconnect" href="https://unpkg.com">
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap"></noscript>
    
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #030712; 
            color: #f3f4f6; 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeSpeed; 
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        
        .glass-card {
            will-change: transform, box-shadow;
            transform: translateZ(0); 
        }
        .glass-card:hover {
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 10px 40px -10px rgba(59, 130, 246, 0.2);
            transform: translateY(-4px) translateZ(0);
        }
        
        .fast-grid {
            content-visibility: auto;
            contain-intrinsic-size: 800px;
        }

        [x-cloak] { display: none !important; }
        .admin-secret-trigger { opacity: 0; cursor: default; transition: opacity 0.2s; }
        .admin-secret-trigger:hover { opacity: 0.1; }
        select option { background-color: #111827; color: #fff; }
    </style>
</head>
<body x-data="storeData()" x-init="initStore()" class="relative min-h-screen flex flex-col selection:bg-blue-500 selection:text-white">

    <div x-show="toastMsg" 
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 translate-y-5 scale-95"
         x-transition:enter-end="opacity-100 translate-y-0 scale-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         x-cloak 
         class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-blue-600 text-white px-8 py-3 rounded-full shadow-[0_10px_30px_rgba(37,99,235,0.4)] z-[200] font-bold text-sm flex items-center gap-2 transform-gpu">
        <span class="w-2 h-2 rounded-full bg-green-300 animate-pulse" aria-hidden="true"></span>
        <span x-text="toastMsg"></span>
    </div>

    <nav class="fixed top-0 w-full z-50 glass border-b border-white/5 transform-gpu">
        <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex justify-between w-full md:w-auto items-center">
                <div class="text-3xl font-extrabold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-blue-600 cursor-pointer" @click="openPage('home')">LUMINA</div>
                <button @click="openLogin()" aria-label="تسجيل دخول الإدارة" class="admin-secret-trigger text-[10px] px-3 py-1 md:hidden">ADMIN</button>
            </div>
            
            <div class="flex space-x-reverse space-x-6 text-sm font-bold opacity-80 overflow-x-auto w-full md:w-auto hide-scrollbar pb-1 md:pb-0">
                <button @click="openPage('home')" :class="currentPage === 'home' ? 'text-blue-400 border-b-2 border-blue-400' : 'hover:text-blue-400 transition-colors'" class="pb-1 whitespace-nowrap">الرئيسية</button>
                <button @click="openCategory('workstation')" :class="activeCategory === 'workstation' && currentPage === 'category' ? 'text-blue-400 border-b-2 border-blue-400' : 'hover:text-blue-400 transition-colors'" class="pb-1 whitespace-nowrap">Workstation</button>
                <button @click="openCategory('business')" :class="activeCategory === 'business' && currentPage === 'category' ? 'text-blue-400 border-b-2 border-blue-400' : 'hover:text-blue-400 transition-colors'" class="pb-1 whitespace-nowrap">Business</button>
                <button @click="openCategory('gaming')" :class="activeCategory === 'gaming' && currentPage === 'category' ? 'text-blue-400 border-b-2 border-blue-400' : 'hover:text-blue-400 transition-colors'" class="pb-1 whitespace-nowrap">Gaming</button>
                <button @click="openPage('after-sales')" :class="currentPage === 'after-sales' ? 'text-blue-400 border-b-2 border-blue-400' : 'hover:text-blue-400 transition-colors'" class="pb-1 whitespace-nowrap">الصيانة</button>
                <button @click="openPage('contact')" :class="currentPage === 'contact' ? 'text-blue-400 border-b-2 border-blue-400' : 'hover:text-blue-400 transition-colors'" class="pb-1 whitespace-nowrap">تواصل معنا</button>
            </div>
            
            <div class="hidden md:flex items-center gap-4">
                <button @click="openLogin()" aria-label="تسجيل دخول الإدارة" class="admin-secret-trigger text-[10px] px-3 py-1">ADMIN</button>
            </div>
        </div>
    </nav>

    <div class="pt-32 md:pt-24"></div>

    <div x-show="showLoginModal" x-transition.opacity.duration.200ms x-cloak class="fixed inset-0 z-[150] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 transform-gpu">
        <div class="glass p-10 rounded-[30px] w-full max-w-sm text-center relative shadow-2xl" @click.away="showLoginModal = false">
            <button @click="showLoginModal = false" aria-label="إغلاق" class="absolute top-6 left-6 text-gray-500 hover:text-white text-2xl transition">✕</button>
            <div class="text-4xl mb-4 bg-blue-500/10 w-16 h-16 mx-auto rounded-full flex items-center justify-center" aria-hidden="true">🔐</div>
            <h3 class="text-2xl font-black text-white mb-8">تسجيل الدخول</h3>
            <input type="text" x-model="loginData.username" aria-label="اسم المستخدم" placeholder="اسم المستخدم" class="w-full bg-gray-900/50 border border-white/10 p-4 rounded-xl mb-4 text-right outline-none focus:border-blue-500">
            <input type="password" x-model="loginData.password" aria-label="كلمة المرور" placeholder="كلمة المرور" @keydown.enter="attemptLogin()" class="w-full bg-gray-900/50 border border-white/10 p-4 rounded-xl mb-8 text-right outline-none focus:border-blue-500">
            <button @click="attemptLogin()" :disabled="isLoggingIn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-lg transition-colors shadow-lg active:scale-95 disabled:opacity-70">
                <span x-text="isLoggingIn ? 'جاري التحقق...' : 'دخول'"></span>
            </button>
        </div>
    </div>

    <section x-show="isAdmin" x-transition.opacity.duration.200ms x-cloak class="py-6 px-6 bg-blue-900/10 border-b border-blue-500/20 mb-8 relative overflow-hidden transform-gpu">
        <div class="max-w-5xl mx-auto glass p-8 rounded-[24px]">
            <div class="flex justify-between items-center mb-8 border-b border-white/5 pb-4">
                <h2 class="text-2xl font-bold text-blue-400"><span aria-hidden="true">⚙️</span> لوحة التحكم</h2>
                <div class="flex gap-3">
                    <a :href="googleSheetLink" target="_blank" class="text-green-400 text-sm font-bold hover:text-green-300 transition bg-green-500/10 px-4 py-2 rounded-lg flex items-center gap-1"><span aria-hidden="true">📊</span> فتح الشيت</a>
                    <button @click="logout()" class="text-red-400 text-sm font-bold hover:text-red-300 transition bg-red-500/10 px-4 py-2 rounded-lg">خروج</button>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                <input type="text" x-model="newItem.name" aria-label="اسم الجهاز" placeholder="اسم الجهاز" class="bg-gray-900/50 border border-white/10 p-3.5 rounded-xl text-right outline-none focus:border-blue-500">
                <select x-model="newItem.category" aria-label="القسم" class="bg-gray-900/50 border border-white/10 p-3.5 rounded-xl text-right text-gray-300 outline-none focus:border-blue-500">
                    <option value="workstation">Workstation</option>
                    <option value="business">Business</option>
                    <option value="gaming">Gaming</option>
                </select>
                <input type="text" x-model="newItem.price" aria-label="السعر" placeholder="السعر" class="bg-gray-900/50 border border-white/10 p-3.5 rounded-xl text-right outline-none focus:border-blue-500">
                <input type="text" x-model="newItem.salePrice" aria-label="سعر التخفيض" placeholder="سعر التخفيض" class="bg-gray-900/50 border border-green-500/30 p-3.5 rounded-xl text-right text-green-400 outline-none focus:border-green-500">
                <input type="text" x-model="newItem.specs" aria-label="المواصفات" placeholder="المواصفات" class="lg:col-span-2 bg-gray-900/50 border border-white/10 p-3.5 rounded-xl text-right outline-none focus:border-blue-500">
                
                <input type="url" x-model="newItem.img" aria-label="رابط الصورة" placeholder="رابط صورة المنتج (http / https)" class="lg:col-span-3 bg-gray-900/50 border border-white/10 p-3.5 rounded-xl text-right outline-none focus:border-blue-500 text-left" dir="ltr">
                
                <input type="url" x-model="newItem.link" aria-label="رابط إضافي" placeholder="رابط إضافي للمنتج (يوتيوب أو الموقع الرسمي - اختياري)" class="lg:col-span-3 bg-gray-900/50 border border-white/10 p-3.5 rounded-xl text-right outline-none focus:border-blue-500 text-left" dir="ltr">

                <textarea x-model="newItem.desc" aria-label="الوصف الكامل" placeholder="الوصف الكامل" class="lg:col-span-3 bg-gray-900/50 border border-white/10 p-3.5 rounded-xl text-right outline-none resize-none focus:border-blue-500" rows="2"></textarea>
                <button @click="addProduct()" class="lg:col-span-3 bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-lg transition-colors shadow-lg active:scale-[0.99]">نشر فوراً</button>
            </div>
        </div>
    </section>

    <div class="flex-grow flex flex-col relative w-full h-full">
        
        <div x-show="currentPage === 'home'" 
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-cloak class="w-full transform-gpu">
            
            <section class="flex flex-col justify-center items-center text-center px-4 mb-24 mt-8">
                <span class="bg-blue-500/10 text-blue-400 font-bold px-4 py-1.5 rounded-full text-sm mb-6 border border-blue-500/20">متجر اللابتوب الأول</span>
                <h1 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight">قوة الأداء <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">في متناول يدك.</span></h1>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-5xl mt-10">
                    <button @click="openCategory('workstation')" class="glass glass-card p-8 rounded-[28px] text-center group">
                        <div class="text-6xl mb-4 transform group-hover:scale-110 transition-transform duration-200" aria-hidden="true">🖥️</div>
                        <h3 class="text-2xl font-bold text-white">Workstation</h3>
                    </button>
                    <button @click="openCategory('business')" class="glass glass-card p-8 rounded-[28px] text-center group">
                        <div class="text-6xl mb-4 transform group-hover:scale-110 transition-transform duration-200" aria-hidden="true">💼</div>
                        <h3 class="text-2xl font-bold text-white">Business</h3>
                    </button>
                    <button @click="openCategory('gaming')" class="glass glass-card p-8 rounded-[28px] text-center group">
                        <div class="text-6xl mb-4 transform group-hover:scale-110 transition-transform duration-200" aria-hidden="true">🎮</div>
                        <h3 class="text-2xl font-bold text-white">Gaming</h3>
                    </button>
                </div>
            </section>

            <section class="max-w-7xl mx-auto px-6 mb-24 text-right fast-grid">
                <h2 class="text-3xl font-black border-r-4 border-blue-500 pr-4 mb-10">أرخص الأسعار</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8">
                    <template x-for="laptop in products.slice(0, 6)" :key="'sample-'+laptop.id">
                        <div class="glass glass-card p-4 rounded-[24px] flex flex-col h-full relative cursor-pointer" @click="openModal(laptop)">
                            <div x-show="laptop.salePrice" class="absolute top-6 left-6 bg-red-500 text-white text-xs font-bold px-3 py-1.5 rounded-full z-10 shadow-lg">🔥 عرض</div>
                            
                            <div class="w-full h-48 bg-gray-900/50 rounded-[16px] mb-4 overflow-hidden relative flex items-center justify-center">
                                <img :src="laptop.img" :alt="laptop.name" loading="lazy" decoding="async" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300">
                            </div>

                            <span class="text-[11px] font-bold text-blue-400 mb-2 bg-blue-500/10 px-2 py-1 rounded w-max" x-text="getCategoryName(laptop.category)"></span>
                            <h3 class="text-lg font-bold mb-1 text-white line-clamp-2" x-text="laptop.name"></h3>
                            
                            <div class="mt-auto pt-4 flex items-center justify-end flex-row-reverse">
                                <div>
                                    <template x-if="laptop.salePrice">
                                        <div class="flex flex-col text-right">
                                            <span class="text-gray-500 line-through text-xs font-medium" x-text="formatPrice(laptop.price)"></span>
                                            <span class="text-green-400 font-black text-xl" x-text="formatPrice(laptop.salePrice)"></span>
                                        </div>
                                    </template>
                                    <template x-if="!laptop.salePrice">
                                        <span class="text-white font-black text-xl" x-text="formatPrice(laptop.price)"></span>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </section>
        </div>

        <div x-show="currentPage === 'category'" 
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 translate-x-4"
             x-transition:enter-end="opacity-100 translate-x-0"
             x-cloak class="w-full max-w-7xl mx-auto px-6 flex-grow transform-gpu">
            
            <div class="flex flex-col md:flex-row justify-between items-center mb-10 border-b border-white/5 pb-6 gap-4">
                <h2 class="text-4xl font-black flex items-center gap-3">
                    <span x-text="getCategoryEmoji(activeCategory)" aria-hidden="true"></span>
                    <span class="text-white" x-text="getCategoryName(activeCategory)"></span>
                </h2>
                <button @click="openPage('home')" class="bg-gray-900 hover:bg-gray-800 border border-white/10 px-6 py-2 rounded-full font-bold transition-colors text-sm">العودة للرئيسية ➔</button>
            </div>

            <div x-show="isLoading" class="flex justify-center py-20">
                <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            </div>

            <div x-show="!isLoading && getFilteredProducts().length === 0" class="text-center py-20 text-gray-500 glass rounded-[24px]">
                <div class="text-5xl mb-4 opacity-50" aria-hidden="true">📭</div>
                <p class="text-lg font-medium">لا يوجد أجهزة في هذا القسم حالياً.</p>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8 mb-10 fast-grid">
                <template x-for="(laptop, index) in getFilteredProducts().slice(0, visibleCount)" :key="'cat-'+laptop.id">
                    <div class="glass glass-card p-4 rounded-[24px] flex flex-col h-full relative cursor-pointer" @click="openModal(laptop)">
                        <div x-show="laptop.salePrice" class="absolute top-6 left-6 bg-red-500 text-white text-xs font-bold px-3 py-1.5 rounded-full z-10">🔥 تخفيض</div>
                        
                        <div class="w-full h-52 bg-gray-900/50 rounded-[16px] mb-4 overflow-hidden relative flex items-center justify-center">
                            <img :src="laptop.img" :alt="laptop.name" loading="lazy" decoding="async" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300">
                        </div>

                        <h3 class="text-xl font-bold mb-2 text-white line-clamp-2" x-text="laptop.name"></h3>
                        <p class="text-gray-400 text-sm line-clamp-2 mb-4" x-text="laptop.specs"></p>
                        
                        <div class="mt-auto text-right mb-4 border-t border-white/5 pt-4">
                            <template x-if="laptop.salePrice">
                                <div class="flex items-center gap-2 justify-end flex-row-reverse">
                                    <p class="text-green-400 font-black text-2xl" x-text="formatPrice(laptop.salePrice)"></p>
                                    <p class="text-gray-500 line-through text-sm" x-text="formatPrice(laptop.price)"></p>
                                </div>
                            </template>
                            <template x-if="!laptop.salePrice">
                                <p class="text-white font-black text-2xl" x-text="formatPrice(laptop.price)"></p>
                            </template>
                        </div>
                        <button x-show="isAdmin" @click.stop="deleteProduct(laptop.id)" class="bg-red-500/10 py-2 rounded-xl text-red-400 hover:bg-red-500 hover:text-white transition-colors text-sm font-bold">حذف الجهاز</button>
                    </div>
                </template>
            </div>

            <div x-show="getFilteredProducts().length > visibleCount" class="text-center mt-6 mb-24">
                <button @click="visibleCount += 6" class="bg-blue-600 hover:bg-blue-500 text-white px-10 py-3.5 rounded-full font-bold text-lg transition-transform active:scale-95 shadow-lg border border-white/10">
                    عرض المزيد ⬇️
                </button>
            </div>
        </div>

        <div x-show="currentPage === 'contact'" x-cloak class="w-full max-w-4xl mx-auto px-6 py-12 flex-grow">
            <h2 class="text-4xl font-black text-white text-center mb-12">تواصل معنا</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <a href="tel:+201000000000" class="glass glass-card p-8 rounded-[24px] text-center block">
                    <div class="text-4xl mb-4" aria-hidden="true">📞</div>
                    <h3 class="text-xl font-bold text-white">اتصل بنا</h3>
                </a>
                <a href="#" class="glass glass-card p-8 rounded-[24px] text-center block">
                    <div class="text-4xl mb-4" aria-hidden="true">📘</div>
                    <h3 class="text-xl font-bold text-white">فيسبوك</h3>
                </a>
                <a href="#" class="glass glass-card p-8 rounded-[24px] text-center block">
                    <div class="text-4xl mb-4" aria-hidden="true">📍</div>
                    <h3 class="text-xl font-bold text-white">موقعنا</h3>
                </a>
            </div>
        </div>

        <div x-show="currentPage === 'after-sales'" x-cloak class="w-full max-w-3xl mx-auto px-6 py-12 flex-grow">
            <h2 class="text-4xl font-black text-white text-center mb-8">خدمة ما بعد البيع</h2>
            <div class="glass p-8 rounded-[24px] text-right">
                <h3 class="text-2xl font-black text-blue-400 mb-4 border-b border-white/5 pb-4"><span aria-hidden="true">🛡️</span> ضمان 3 شهور</h3>
                <input type="text" x-model="supportData.name" aria-label="الاسم الكريم" placeholder="الاسم الكريم" class="w-full bg-gray-900/50 border border-white/10 p-4 rounded-xl text-right outline-none focus:border-blue-500 mb-3">
                <input type="tel" x-model="supportData.phone" aria-label="رقم الهاتف" placeholder="رقم الهاتف للتواصل" class="w-full bg-gray-900/50 border border-white/10 p-4 rounded-xl text-right outline-none focus:border-blue-500 mb-3">
                <textarea x-model="supportData.problem" aria-label="وصف المشكلة" placeholder="صف المشكلة..." rows="3" class="w-full bg-gray-900/50 border border-white/10 p-4 rounded-xl text-right outline-none focus:border-blue-500 mb-4 resize-none"></textarea>
                <button @click="submitSupport()" class="w-full bg-blue-600 hover:bg-blue-500 py-3.5 rounded-xl font-bold text-lg transition-colors active:scale-[0.98]">إرسال لخدمة العملاء</button>
            </div>
        </div>
    </div>

    <div x-show="selectedProduct" 
         x-transition.opacity.duration.200ms
         x-cloak 
         class="fixed inset-0 z-[110] flex items-center justify-center p-0 md:p-6 bg-black/90 backdrop-blur-sm overflow-y-auto transform-gpu">
        <div class="bg-[#0f1420] border border-white/10 w-full md:max-w-5xl md:rounded-[24px] overflow-hidden flex flex-col md:flex-row shadow-2xl min-h-screen md:min-h-0 my-auto relative" 
             @click.away="closeModal()">
            <button @click="closeModal()" aria-label="إغلاق التفاصيل" class="absolute top-4 left-4 z-20 w-10 h-10 bg-black/50 hover:bg-black text-white rounded-full flex items-center justify-center backdrop-blur-sm transition-colors">✕</button>
            
            <div class="md:w-1/2 h-64 md:h-auto overflow-hidden bg-gray-900/50 relative flex items-center justify-center">
                <img :src="selectedProduct?.img" :alt="selectedProduct?.name" class="w-full h-full object-cover absolute inset-0 z-10">
            </div>

            <div class="md:w-1/2 p-6 md:p-10 text-right overflow-y-auto max-h-screen md:max-h-[85vh] hide-scrollbar flex flex-col">
                <h2 class="text-3xl font-black mb-4 text-white" x-text="selectedProduct?.name"></h2>
                
                <div class="mb-6 pb-6 border-b border-white/5">
                    <p class="text-green-400 font-black text-3xl" x-text="formatPrice(selectedProduct?.salePrice || selectedProduct?.price)"></p>
                </div>
                
                <div class="mb-6">
                    <h4 class="text-sm font-bold text-gray-400 mb-2">المواصفات</h4>
                    <div class="bg-white/5 p-4 rounded-xl text-gray-200 text-sm" x-text="selectedProduct?.specs"></div>
                </div>
                
                <div class="mb-8">
                    <h4 class="text-sm font-bold text-gray-400 mb-2">الوصف</h4>
                    <p class="text-gray-400 text-sm leading-relaxed" x-text="selectedProduct?.desc"></p>
                    
                    <template x-if="selectedProduct?.link">
                        <a :href="selectedProduct.link" target="_blank" class="inline-flex items-center gap-2 mt-4 text-blue-400 hover:text-blue-300 font-bold transition-colors bg-blue-500/10 px-4 py-2 rounded-lg border border-blue-500/20">
                            <svg class="w-5 h-5" aria-hidden="true" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                            <span>رابط خارجي لتفاصيل المنتج</span>
                        </a>
                    </template>
                </div>
                
                <div class="mt-auto">
                    <div x-show="!showOrderForm">
                        <button @click="showOrderForm = true" class="w-full bg-white text-black hover:bg-gray-200 py-4 rounded-xl font-black text-lg active:scale-95 transition-all">اطلب الآن</button>
                    </div>
                    <div x-show="showOrderForm" class="bg-gray-900/80 p-5 rounded-xl border border-white/10">
                        <input type="text" x-model="orderData.name" aria-label="الاسم" placeholder="الاسم" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg mb-2 text-right outline-none focus:border-blue-500">
                        <input type="tel" x-model="orderData.phone" aria-label="رقم الهاتف" placeholder="رقم الهاتف" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg mb-2 text-right outline-none focus:border-blue-500">
                        <input type="text" x-model="orderData.address" aria-label="العنوان" placeholder="العنوان" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg mb-4 text-right outline-none focus:border-blue-500">
                        <button @click="submitOrder()" class="w-full bg-green-500 hover:bg-green-400 text-black py-3 rounded-lg font-black transition-all active:scale-95">تأكيد (واتساب)</button>
                        <button @click="showOrderForm = false" class="w-full text-center mt-3 text-gray-500 hover:text-white text-sm">إلغاء</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-6 border-t border-white/5 bg-[#030712] text-center text-gray-500 text-sm">
        <p>© 2026 LUMINA Laptop</p>
    </footer>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
    function storeData() {
        return {
            isAdmin: false, showLoginModal: false, isLoggingIn: false, loginData: { username: '', password: '' },
            currentPage: 'home', activeCategory: 'business', selectedProduct: null,
            products: [], isLoading: false, toastMsg: '', showOrderForm: false,
            orderData: { name: '', phone: '', address: '' }, supportData: { name: '', phone: '', problem: '' },
            whatsappNumber: "201000000000", 
            
            newItem: { name: '', price: '', salePrice: '', specs: '', img: '', desc: '', category: 'workstation', link: '' },
            visibleCount: 6, 
            
            googleSheetLink: "https://docs.google.com/spreadsheets/d/1xhB_1MELyWkPh4ugratmKSKsP1obHAcEJ893CGx9bfQ/edit?gid=0#gid=0",
            scriptURL: "https://script.google.com/macros/s/AKfycbyTl5XPgL_lEbRp---S0ti9ocJW2a6su519pPdXDfcC71nKZl15TKSRW4Xrw7QYsbPb/exec",

            initStore() {
                const cachedData = localStorage.getItem('lumina_products');
                if (cachedData) {
                    try {
                        this.products = JSON.parse(cachedData);
                        this.isLoading = false; 
                    } catch (e) {
                        this.isLoading = true;
                    }
                } else {
                    this.isLoading = true; 
                }

                fetch(this.scriptURL)
                .then(res => {
                    const contentType = res.headers.get("content-type");
                    if (contentType && contentType.indexOf("application/json") !== -1) {
                        return res.json();
                    } else {
                        throw new TypeError("تأكد من إعدادات جوجل شيتس (Who has access: Anyone)");
                    }
                })
                .then(data => {
                    if(data && Array.isArray(data)) {
                        this.products = data.sort((a, b) => {
                            let priceA = parseInt(String(a.salePrice || a.price || "0").replace(/[^0-9]/g, ''));
                            let priceB = parseInt(String(b.salePrice || b.price || "0").replace(/[^0-9]/g, ''));
                            return priceA - priceB;
                        });
                        localStorage.setItem('lumina_products', JSON.stringify(this.products));
                    }
                })
                .catch(e => console.error("خطأ:", e.message))
                .finally(() => this.isLoading = false);
            },

            openPage(page) { window.scrollTo({ top: 0 }); this.currentPage = page; },
            openCategory(cat) { 
                this.activeCategory = cat; 
                this.visibleCount = 6; 
                this.openPage('category'); 
            },
            getFilteredProducts() { return this.products.filter(p => p.category === this.activeCategory); },
            getCategoryName(cat) { const names = { 'workstation': 'Workstation', 'business': 'Business', 'gaming': 'Gaming' }; return names[cat] || 'عام'; },
            getCategoryEmoji(cat) { const emojis = { 'workstation': '🖥️', 'business': '💼', 'gaming': '🎮' }; return emojis[cat] || '💻'; },
            openLogin() { this.showLoginModal = true; },
            
            attemptLogin() {
                if(!this.loginData.username || !this.loginData.password) return;
                this.isLoggingIn = true;
                fetch(`${this.scriptURL}?action=login&username=${encodeURIComponent(this.loginData.username)}&password=${encodeURIComponent(this.loginData.password)}`)
                .then(res => res.json()).then(data => {
                    this.isLoggingIn = false;
                    if(data.success) { this.isAdmin = true; this.showLoginModal = false; this.loginData = { username: '', password: '' }; this.showToast("تم الدخول بنجاح"); } 
                    else alert('بيانات خاطئة!');
                }).catch(() => { this.isLoggingIn = false; });
            },
            logout() { this.isAdmin = false; this.showToast("تم الخروج"); },
            formatPrice(p) { return p ? p.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",") + ' ج.م' : ''; },
            showToast(msg) { this.toastMsg = msg; setTimeout(() => { this.toastMsg = ''; }, 2500); },

            addProduct() {
                if(!this.newItem.name || !this.newItem.price || !this.newItem.img) {
                    alert("الرجاء إكمال كافة البيانات الأساسية بما فيها رابط الصورة.");
                    return;
                }
                if(!this.newItem.img.startsWith('http')) {
                    alert("عذراً، يجب إدخال رابط صورة صحيح يبدأ بـ http أو https");
                    return;
                }

                let productToSave = {...this.newItem};
                let tempProduct = {...this.newItem, id: new Date().getTime()};
                
                this.products.push(tempProduct); 
                this.products.sort((a, b) => {
                    let priceA = parseInt(String(a.salePrice || a.price || "0").replace(/[^0-9]/g, ''));
                    let priceB = parseInt(String(b.salePrice || b.price || "0").replace(/[^0-9]/g, ''));
                    return priceA - priceB;
                });

                localStorage.setItem('lumina_products', JSON.stringify(this.products));
                this.showToast('تمت الإضافة بنجاح');
                this.newItem = { name: '', price: '', salePrice: '', specs: '', img: '', desc: '', category: 'workstation', link: '' };
                fetch(this.scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'add', product: productToSave }) });
            },

            deleteProduct(id) {
                if(confirm('هل أنت متأكد من الحذف؟')) {
                    this.products = this.products.filter(p => p.id !== id);
                    localStorage.setItem('lumina_products', JSON.stringify(this.products));
                    this.showToast('تم الحذف');
                    fetch(this.scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete', id: id }) });
                }
            },

            openModal(product) { this.selectedProduct = product; this.showOrderForm = false; },
            closeModal() { this.selectedProduct = null; },
            submitOrder() {
                if(!this.orderData.name || !this.orderData.phone) return;
                let price = this.selectedProduct.salePrice || this.selectedProduct.price;
                let msg = `🛒 *طلب شراء*\nالجهاز: ${this.selectedProduct.name}\nالسعر: ${price}\nالعميل: ${this.orderData.name}\nالهاتف: ${this.orderData.phone}\nالعنوان: ${this.orderData.address}`;
                window.open(`https://wa.me/${this.whatsappNumber}?text=${encodeURIComponent(msg)}`, '_blank');
            },
            submitSupport() {
                if(!this.supportData.name || !this.supportData.problem) return;
                let msg = `🛠️ *صيانة*\nالعميل: ${this.supportData.name}\nالهاتف: ${this.supportData.phone}\nالمشكلة: ${this.supportData.problem}`;
                window.open(`https://wa.me/${this.whatsappNumber}?text=${encodeURIComponent(msg)}`, '_blank');
                this.supportData = { name: '', phone: '', problem: '' };
            }
        }
    }
    </script>
</body>
</html>
