<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMINA | متجر اللابتوب السريع</title>
    <meta name="description" content="متجر LUMINA - أفضل وأسرع متجر لشراء أجهزة اللابتوب بأرخص الأسعار مع ضمان حقيقي.">
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap">
    </noscript>
    
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="storeData()" x-init="initStore()">

    <div x-show="toastMsg" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-5 scale-95" x-transition:enter-end="opacity-100 translate-y-0 scale-100" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95" x-cloak class="toast-msg">
        <span class="toast-dot" aria-hidden="true"></span>
        <span x-text="toastMsg"></span>
    </div>

    <nav class="navbar glass">
        <div class="container nav-content">
            <div class="flex-between w-full">
                <div class="logo" @click="openPage('home')">LUMINA</div>
            </div>
            
            <div class="nav-links hide-scrollbar">
                <button @click="openPage('home')" :class="currentPage === 'home' ? 'nav-link active' : 'nav-link'">الرئيسية</button>
                <button @click="openCategory('workstation')" :class="activeCategory === 'workstation' && currentPage === 'category' ? 'nav-link active' : 'nav-link'">Workstation</button>
                <button @click="openCategory('business')" :class="activeCategory === 'business' && currentPage === 'category' ? 'nav-link active' : 'nav-link'">Business</button>
                <button @click="openCategory('gaming')" :class="activeCategory === 'gaming' && currentPage === 'category' ? 'nav-link active' : 'nav-link'">Gaming</button>
                <button @click="openPage('after-sales')" :class="currentPage === 'after-sales' ? 'nav-link active' : 'nav-link'">الصيانة</button>
                <button @click="openPage('contact')" :class="currentPage === 'contact' ? 'nav-link active' : 'nav-link'">تواصل معنا</button>
                <button @click="openLogin()" class="nav-link">الإدارة</button>
            </div>
        </div>
    </nav>

    <div class="navbar-spacer"></div>

    <div x-show="showLoginModal" x-transition.opacity.duration.200ms x-cloak class="modal-overlay" @click.self="showLoginModal = false">
        <div class="glass login-box">
            <button @click="showLoginModal = false" aria-label="إغلاق" class="close-btn">✕</button>
            <div class="modal-icon" aria-hidden="true">🔐</div>
            <h3 class="modal-heading">تسجيل الدخول</h3>
            <input type="text" x-model="loginData.username" placeholder="اسم المستخدم" class="form-control">
            <input type="password" x-model="loginData.password" placeholder="كلمة المرور" @keydown.enter="attemptLogin()" class="form-control">
            <button @click="attemptLogin()" :disabled="isLoggingIn" class="btn btn-primary">
                <span x-text="isLoggingIn ? 'جاري التحقق...' : 'دخول'"></span>
            </button>
        </div>
    </div>

    <section x-show="isAdmin" x-transition.opacity.duration.200ms x-cloak class="admin-panel">
        <div class="container glass admin-container">
            <div class="admin-header">
                <h2 class="admin-title">⚙️ لوحة التحكم</h2>
                <div class="admin-links">
                    <a :href="googleSheetLink" target="_blank" class="link-sheet">📊 الشيت</a>
                    <button @click="logout()" class="link-logout">خروج</button>
                </div>
            </div>
            <div class="grid-cols grid-3">
                <input type="text" x-model="newItem.name" placeholder="اسم الجهاز" class="form-control">
                <select x-model="newItem.category" class="form-control">
                    <option value="workstation">Workstation</option>
                    <option value="business">Business</option>
                    <option value="gaming">Gaming</option>
                </select>
                <input type="text" x-model="newItem.price" placeholder="السعر" class="form-control">
                <input type="text" x-model="newItem.salePrice" placeholder="سعر التخفيض" class="form-control green-focus">
                <input type="text" x-model="newItem.specs" placeholder="المواصفات" class="form-control col-span-2">
                <input type="url" x-model="newItem.img" placeholder="رابط الصورة (http)" class="form-control text-left col-span-full" dir="ltr">
                <input type="url" x-model="newItem.link" placeholder="رابط إضافي للمنتج (يوتيوب أو الموقع الرسمي)" class="form-control text-left col-span-full" dir="ltr">
                <textarea x-model="newItem.desc" placeholder="الوصف الكامل" class="form-control col-span-full no-resize" rows="2"></textarea>
                <button @click="addProduct()" class="btn btn-primary col-span-full">نشر فوراً</button>
            </div>
        </div>
    </section>

    <div class="container flex-col-grow">
        
        <div x-show="currentPage === 'home'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" x-cloak>
            <section class="hero-section flex-center flex-col">
                <span class="hero-badge">متجر اللابتوب الأول</span>
                <h1 class="hero-title">قوة الأداء <br><span class="gradient">في متناول يدك.</span></h1>
                
                <div class="grid-cols grid-3 w-full mt-8">
                    <button @click="openCategory('workstation')" class="glass glass-card category-card">
                        <div class="category-icon" aria-hidden="true">🖥️</div>
                        <h3 class="category-title">Workstation</h3>
                    </button>
                    <button @click="openCategory('business')" class="glass glass-card category-card">
                        <div class="category-icon" aria-hidden="true">💼</div>
                        <h3 class="category-title">Business</h3>
                    </button>
                    <button @click="openCategory('gaming')" class="glass glass-card category-card">
                        <div class="category-icon" aria-hidden="true">🎮</div>
                        <h3 class="category-title">Gaming</h3>
                    </button>
                </div>
            </section>

            <section class="mb-8">
                <h2 class="section-title">أرخص الأسعار</h2>
                <div class="grid-cols grid-3">
                    <template x-for="laptop in products.slice(0, 6)" :key="'sample-'+laptop.id">
                        <div class="glass glass-card product-card" @click="openModal(laptop)">
                            <div x-show="laptop.salePrice" class="sale-badge">🔥 عرض</div>
                            <div class="product-img-box">
                                <img :src="laptop.img" :alt="laptop.name" loading="lazy" decoding="async">
                            </div>
                            <span class="product-tag" x-text="getCategoryName(laptop.category)"></span>
                            <h3 class="product-name" x-text="laptop.name"></h3>
                            <div class="product-footer">
                                <template x-if="laptop.salePrice">
                                    <div class="price-box">
                                        <span class="price-old" x-text="formatPrice(laptop.price)"></span>
                                        <span class="price-new" x-text="formatPrice(laptop.salePrice)"></span>
                                    </div>
                                </template>
                                <template x-if="!laptop.salePrice">
                                    <span class="price-regular" x-text="formatPrice(laptop.price)"></span>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </section>
        </div>

        <div x-show="currentPage === 'category'" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-x-4" x-transition:enter-end="opacity-100 translate-x-0" x-cloak>
            <div class="page-header mt-8">
                <h2 class="category-page-title">
                    <span x-text="getCategoryEmoji(activeCategory)" aria-hidden="true"></span>
                    <span x-text="getCategoryName(activeCategory)"></span>
                </h2>
                <button @click="openPage('home')" class="btn-white btn-rounded">العودة ➔</button>
            </div>

            <div x-show="isLoading" class="flex-center py-20">
                <div class="spinner"></div>
            </div>

            <div x-show="!isLoading && getFilteredProducts().length === 0" class="glass text-center empty-state">
                <div class="empty-icon" aria-hidden="true">📭</div>
                <p class="empty-text">لا يوجد أجهزة في هذا القسم حالياً.</p>
            </div>

            <div class="grid-cols grid-3 mb-8">
                <template x-for="(laptop, index) in getFilteredProducts().slice(0, visibleCount)" :key="'cat-'+laptop.id">
                    <div class="glass glass-card product-card" @click="openModal(laptop)">
                        <div x-show="laptop.salePrice" class="sale-badge">🔥 تخفيض</div>
                        <div class="product-img-box h-13rem">
                            <img :src="laptop.img" :alt="laptop.name" loading="lazy" decoding="async">
                        </div>
                        <h3 class="product-name text-xl" x-text="laptop.name"></h3>
                        <p class="product-specs" x-text="laptop.specs"></p>
                        
                        <div class="product-footer mb-4">
                            <template x-if="laptop.salePrice">
                                <div class="price-box price-box-row">
                                    <span class="price-new text-2xl" x-text="formatPrice(laptop.salePrice)"></span>
                                    <span class="price-old" x-text="formatPrice(laptop.price)"></span>
                                </div>
                            </template>
                            <template x-if="!laptop.salePrice">
                                <span class="price-regular text-2xl" x-text="formatPrice(laptop.price)"></span>
                            </template>
                        </div>
                        <button x-show="isAdmin" @click.stop="deleteProduct(laptop.id)" class="btn-danger-sm">حذف الجهاز</button>
                    </div>
                </template>
            </div>

            <div x-show="getFilteredProducts().length > visibleCount" class="text-center mb-8">
                <button @click="visibleCount += 6" class="btn btn-primary btn-load-more">عرض المزيد ⬇️</button>
            </div>
        </div>

        <div x-show="currentPage === 'contact'" x-cloak class="mt-8 mb-8 page-container">
            <h2 class="hero-title text-center">تواصل معنا</h2>
            <div class="grid-cols grid-3">
                <a href="tel:+201000000000" class="glass glass-card category-card text-center">
                    <div class="contact-card" aria-hidden="true">📞</div>
                    <h3 class="category-title">اتصل بنا</h3>
                </a>
                <a href="#" class="glass glass-card category-card text-center">
                    <div class="contact-card" aria-hidden="true">📘</div>
                    <h3 class="category-title">فيسبوك</h3>
                </a>
                <a href="#" class="glass glass-card category-card text-center">
                    <div class="contact-card" aria-hidden="true">📍</div>
                    <h3 class="category-title">موقعنا</h3>
                </a>
            </div>
        </div>

        <div x-show="currentPage === 'after-sales'" x-cloak class="mt-8 mb-8 page-container-sm">
            <h2 class="hero-title text-center">خدمة ما بعد البيع</h2>
            <div class="glass box-p-2rem">
                <h3 class="warranty-title"><span aria-hidden="true">🛡️</span> ضمان 3 شهور</h3>
                <input type="text" x-model="supportData.name" placeholder="الاسم الكريم" class="form-control">
                <input type="tel" x-model="supportData.phone" placeholder="رقم الهاتف للتواصل" class="form-control">
                <textarea x-model="supportData.problem" placeholder="صف المشكلة..." rows="3" class="form-control no-resize"></textarea>
                <button @click="submitSupport()" class="btn btn-primary">إرسال لخدمة العملاء</button>
            </div>
        </div>
    </div>

    <div x-show="selectedProduct" x-transition.opacity.duration.200ms x-cloak class="modal-overlay" @click.self="closeModal()">
        <div class="product-modal">
            <button @click="closeModal()" aria-label="إغلاق التفاصيل" class="modal-close-float">✕</button>
            
            <div class="modal-img-area">
                <img :src="selectedProduct?.img" :alt="selectedProduct?.name">
            </div>

            <div class="modal-details hide-scrollbar">
                <h2 class="modal-title" x-text="selectedProduct?.name"></h2>
                
                <div class="modal-price-box">
                    <p class="modal-price-text" x-text="formatPrice(selectedProduct?.salePrice || selectedProduct?.price)"></p>
                </div>
                
                <div class="mb-4">
                    <h4 class="modal-subtitle">المواصفات</h4>
                    <div class="specs-box" x-text="selectedProduct?.specs"></div>
                </div>
                
                <div class="mb-8">
                    <h4 class="modal-subtitle">الوصف</h4>
                    <p class="modal-desc-text" x-text="selectedProduct?.desc"></p>
                    
                    <template x-if="selectedProduct?.link">
                        <a :href="selectedProduct.link" target="_blank" class="ext-link">
                            <svg class="icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                            <span>رابط خارجي لتفاصيل المنتج</span>
                        </a>
                    </template>
                </div>
                
                <div class="mt-auto">
                    <div x-show="!showOrderForm">
                        <button @click="showOrderForm = true" class="btn btn-white">اطلب الآن</button>
                    </div>
                    <div x-show="showOrderForm" class="order-box">
                        <input type="text" x-model="orderData.name" placeholder="الاسم" class="form-control form-control-dark">
                        <input type="tel" x-model="orderData.phone" placeholder="رقم الهاتف" class="form-control form-control-dark">
                        <input type="text" x-model="orderData.address" placeholder="العنوان" class="form-control form-control-dark mb-4">
                        <button @click="submitOrder()" class="btn btn-success">تأكيد (واتساب)</button>
                        <button @click="showOrderForm = false" class="btn-cancel">إلغاء</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 LUMINA Laptop</p>
    </footer>

    <script>
    function storeData() {
        return {
            isAdmin: false, showLoginModal: false, isLoggingIn: false, loginData: { username: '', password: '' },
            currentPage: 'home', activeCategory: 'business', selectedProduct: null,
            products: [], isLoading: false, toastMsg: '', showOrderForm: false,
            orderData: { name: '', phone: '', address: '' }, supportData: { name: '', phone: '', problem: '' },
            whatsappNumber: "201000000000", 
            newItem: { name: '', price: '', salePrice: '', specs: '', img: '', desc: '', category: 'workstation', link: '' },
            visibleCount: 6, 
            googleSheetLink: "https://docs.google.com/spreadsheets/d/1xhB_1MELyWkPh4ugratmKSKsP1obHAcEJ893CGx9bfQ/edit?gid=0#gid=0",
            scriptURL: "https://script.google.com/macros/s/AKfycbyTl5XPgL_lEbRp---S0ti9ocJW2a6su519pPdXDfcC71nKZl15TKSRW4Xrw7QYsbPb/exec",
            initStore() {
                const cachedData = localStorage.getItem('lumina_products');
                if (cachedData) {
                    try { this.products = JSON.parse(cachedData); this.isLoading = false; } catch (e) { this.isLoading = true; }
                } else { this.isLoading = true; }
                fetch(this.scriptURL).then(res => {
                    const contentType = res.headers.get("content-type");
                    if (contentType && contentType.indexOf("application/json") !== -1) { return res.json(); } 
                    else { throw new TypeError("تأكد من إعدادات جوجل شيتس (Who has access: Anyone)"); }
                }).then(data => {
                    if(data && Array.isArray(data)) {
                        this.products = data.sort((a, b) => {
                            let priceA = parseInt(String(a.salePrice || a.price || "0").replace(/[^0-9]/g, ''));
                            let priceB = parseInt(String(b.salePrice || b.price || "0").replace(/[^0-9]/g, ''));
                            return priceA - priceB;
                        });
                        localStorage.setItem('lumina_products', JSON.stringify(this.products));
                    }
                }).catch(e => console.error("خطأ:", e.message)).finally(() => this.isLoading = false);
            },
            openPage(page) { window.scrollTo({ top: 0 }); this.currentPage = page; },
            openCategory(cat) { this.activeCategory = cat; this.visibleCount = 6; this.openPage('category'); },
            getFilteredProducts() { return this.products.filter(p => p.category === this.activeCategory); },
            getCategoryName(cat) { const names = { 'workstation': 'Workstation', 'business': 'Business', 'gaming': 'Gaming' }; return names[cat] || 'عام'; },
            getCategoryEmoji(cat) { const emojis = { 'workstation': '🖥️', 'business': '💼', 'gaming': '🎮' }; return emojis[cat] || '💻'; },
            openLogin() { this.showLoginModal = true; },
            attemptLogin() {
                if(!this.loginData.username || !this.loginData.password) return;
                this.isLoggingIn = true;
                fetch(`${this.scriptURL}?action=login&username=${encodeURIComponent(this.loginData.username)}&password=${encodeURIComponent(this.loginData.password)}`)
                .then(res => res.json()).then(data => {
                    this.isLoggingIn = false;
                    if(data.success) { this.isAdmin = true; this.showLoginModal = false; this.loginData = { username: '', password: '' }; this.showToast("تم الدخول بنجاح"); } 
                    else alert('بيانات خاطئة!');
                }).catch(() => { this.isLoggingIn = false; });
            },
            logout() { this.isAdmin = false; this.showToast("تم الخروج"); },
            formatPrice(p) { return p ? p.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",") + ' ج.م' : ''; },
            showToast(msg) { this.toastMsg = msg; setTimeout(() => { this.toastMsg = ''; }, 2500); },
            addProduct() {
                if(!this.newItem.name || !this.newItem.price || !this.newItem.img) { alert("الرجاء إكمال كافة البيانات."); return; }
                if(!this.newItem.img.startsWith('http')) { alert("يجب إدخال رابط صورة صحيح"); return; }
                let productToSave = {...this.newItem}; let tempProduct = {...this.newItem, id: new Date().getTime()};
                this.products.push(tempProduct); 
                this.products.sort((a, b) => {
                    let priceA = parseInt(String(a.salePrice || a.price || "0").replace(/[^0-9]/g, ''));
                    let priceB = parseInt(String(b.salePrice || b.price || "0").replace(/[^0-9]/g, ''));
                    return priceA - priceB;
                });
                localStorage.setItem('lumina_products', JSON.stringify(this.products));
                this.showToast('تمت الإضافة بنجاح');
                this.newItem = { name: '', price: '', salePrice: '', specs: '', img: '', desc: '', category: 'workstation', link: '' };
                fetch(this.scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'add', product: productToSave }) });
            },
            deleteProduct(id) {
                if(confirm('هل أنت متأكد من الحذف؟')) {
                    this.products = this.products.filter(p => p.id !== id);
                    localStorage.setItem('lumina_products', JSON.stringify(this.products));
                    this.showToast('تم الحذف');
                    fetch(this.scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete', id: id }) });
                }
            },
            openModal(product) { this.selectedProduct = product; this.showOrderForm = false; },
            closeModal() { this.selectedProduct = null; },
            submitOrder() {
                if(!this.orderData.name || !this.orderData.phone) return;
                let price = this.selectedProduct.salePrice || this.selectedProduct.price;
                let msg = `🛒 *طلب شراء*\nالجهاز: ${this.selectedProduct.name}\nالسعر: ${price}\nالعميل: ${this.orderData.name}\nالهاتف: ${this.orderData.phone}\nالعنوان: ${this.orderData.address}`;
                window.open(`https://wa.me/${this.whatsappNumber}?text=${encodeURIComponent(msg)}`, '_blank');
            },
            submitSupport() {
                if(!this.supportData.name || !this.supportData.problem) return;
                let msg = `🛠️ *صيانة*\nالعميل: ${this.supportData.name}\nالهاتف: ${this.supportData.phone}\nالمشكلة: ${this.supportData.problem}`;
                window.open(`https://wa.me/${this.whatsappNumber}?text=${encodeURIComponent(msg)}`, '_blank');
                this.supportData = { name: '', phone: '', problem: '' };
            }
        }
    }
    </script>
</body>
</html>
